name: VPN NO Russia (ULTRA SIMPLE)

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  combine:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Generate NO Russia VPN
        run: |
          curl -s "https://fastly.jsdelivr.net/gh/igareck/vpn-configs-for-russia@main/BLACK_VLESS_RUS_mobile.txt?filter=(?i)Germany%7CFinland%7CNetherlands%7CPoland" | grep -E '^vless://|^ss://' | grep -Ev '#Russia|sbrf|Moscow|russia|русс|RU:|5.188|109.120' > combined.txt
          echo "" >> combined.txt
          curl -s "https://fastly.jsdelivr.net/gh/igareck/vpn-configs-for-russia@main/BLACK_VLESS_RUS_mobile.txt?filter=(?i)Czechia%7CSweden" | grep -E '^vless://|^ss://' | grep -Ev '#Russia|sbrf|Moscow|russia|русс|RU:|5.188|109.120' >> combined.txt
          echo "" >> combined.txt
          curl -s "https://fastly.jsdelivr.net/gh/igareck/vpn-configs-for-russia@main/BLACK_SS+All_RUS.txt?filter=(?i)Turkey%7CRomania" | grep -E '^vless://|^ss://' | grep -Ev '#Russia|sbrf|Moscow|russia|русс|RU:|5.188|109.120' >> combined.txt
          echo "" >> combined.txt
          curl -s "https://fastly.jsdelivr.net/gh/igareck/vpn-configs-for-russia@main/BLACK_SS+All_RUS.txt?filter=(?i)Germany%7CFinland%7CNetherlands%7CPoland%7CSweden%7CCzechia" | grep -E '^vless://|^ss://' | grep -Ev '#Russia|sbrf|Moscow|russia|русс|RU:|5.188|109.120' >> combined.txt
          echo "" >> combined.txt
          curl -s "https://fastly.jsdelivr.net/gh/igareck/vpn-configs-for-russia@main/Vless-Reality-White-Lists-Rus-Mobile.txt" | grep -E '^vless://|^ss://' | grep -Ev '#Russia|sbrf|Moscow|russia|русс|RU:|5.188|109.120' >> combined.txt
          
          echo "=== ГОТОВО ==="
          lines=$(wc -l < combined.txt)
          echo "Configs: $lines"
          echo "RU check:"
          grep -c '#Russia' combined.txt || echo "0"
          
      - name: Commit
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add combined.txt
          git commit -m "ULTRA SIMPLE NO Russia [$(date)]" || echo "No changes"
          git push
