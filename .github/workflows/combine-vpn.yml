name: VPN NO Russia (WORKING)

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  combine:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Download + NO Russia Filter
        run: |
          rm -f combined.txt && touch combined.txt
          
          # ФИЛЬТР: configs → NO RU → файл
          process_list() {
            curl -s "$1" | grep '^vless://|^ss://|^vmess://' | grep -v binary | grep -Ev '#Russia|sbrf|Moscow|5.188.|109.120.|95.85.|russia|русс|RU:|russ.|miner' >> combined.txt
          }
          
          process_list "https://fastly.jsdelivr.net/gh/igareck/vpn-configs-for-russia@main/BLACK_VLESS_RUS_mobile.txt?filter=(?i)Germany%7CFinland%7CNetherlands%7CPoland"
          echo "" >> combined.txt
          process_list "https://fastly.jsdelivr.net/gh/igareck/vpn-configs-for-russia@main/BLACK_VLESS_RUS_mobile.txt?filter=(?i)Czechia%7CSweden"
          echo "" >> combined.txt
          process_list "https://fastly.jsdelivr.net/gh/igareck/vpn-configs-for-russia@main/BLACK_SS+All_RUS.txt?filter=(?i)Turkey%7CRomania"
          echo "" >> combined.txt
          process_list "https://fastly.jsdelivr.net/gh/igareck/vpn-configs-for-russia@main/BLACK_SS+All_RUS.txt?filter=(?i)Germany%7CFinland%7CNetherlands%7CPoland%7CSweden%7CCzechia"
          echo "" >> combined.txt
          process_list "https://fastly.jsdelivr.net/gh/igareck/vpn-configs-for-russia@main/Vless-Reality-White-Lists-Rus-Mobile.txt"
          
          # ПРОВЕРКА
          echo "=== РЕЗУЛЬТАТ ==="
          wc -l combined.txt
          echo "RU проверка:"
          grep -c '#Russia|sbrf|Moscow' combined.txt || echo "0 RU найдено ✅"
      
      - name: Commit
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add combined.txt
          git commit -m "NO Russia working [$(date)]" || echo "No changes"
          git push
