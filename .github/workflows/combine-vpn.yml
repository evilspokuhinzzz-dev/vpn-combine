name: Build Optimized VPN List

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Download and combine VPN lists
        run: |
          # Функция для скачивания через несколько CDN (fallback)
          download_with_fallback() {
            local FILENAME=$1
            local URL_FASTLY=$2
            local URL_GCORE=$3
            local URL_RAW=$4
            
            curl -sL "$URL_FASTLY" -o "$FILENAME" && return 0
            echo "⚠️ Fastly failed for $FILENAME, trying Gcore..."
            curl -sL "$URL_GCORE" -o "$FILENAME" && return 0
            echo "⚠️ Gcore failed for $FILENAME, trying Raw..."
            curl -sL "$URL_RAW" -o "$FILENAME" && return 0
            echo "❌ All CDNs failed for $FILENAME"
            return 1
          }
          
          # Функция для добавления секции (только если файл не пуст)
          add_section() {
            local TITLE=$1
            local FILENAME=$2
            
            if [ -s "$FILENAME" ]; then
              echo "" >> combined.txt
              echo "# --- $TITLE ---" >> combined.txt
              cat "$FILENAME" >> combined.txt
              echo "✅ Section $TITLE added ($(wc -l < $FILENAME) lines)"
            else
              echo "⚠️ Section $TITLE is empty, skipping"
            fi
          }
          
          # =============================================
          # СОЗДАНИЕ ОПТИМИЗИРОВАННОГО ФАЙЛА
          # =============================================
          echo "# ==========================================" > combined.txt
          echo "# OPTIMIZED VPN LIST (Fast Ping)" >> combined.txt
          echo "# Updated: $(date -u +"%Y-%m-%d %H:%M UTC")" >> combined.txt
          echo "# ==========================================" >> combined.txt
          
          # --- ТОЛЬКО САМЫЕ БЫСТРЫЕ РЕГИОНЫ (Германия, Финляндия, Нидерланды, Польша) ---
          download_with_fallback "turbo.txt" \
            "https://fastly.jsdelivr.net/gh/igareck/vpn-configs-for-russia@main/BLACK_VLESS_RUS_mobile.txt?filter=(?i)Germany%7CFinland%7CNetherlands%7CPoland" \
            "https://gcore.jsdelivr.net/gh/igareck/vpn-configs-for-russia@main/BLACK_VLESS_RUS_mobile.txt?filter=(?i)Germany%7CFinland%7CNetherlands%7CPoland" \
            "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/main/BLACK_VLESS_RUS_mobile.txt"
          add_section "TURBO: Germany, Finland, Netherlands, Poland" "turbo.txt"
          
          # --- БЫСТРЫЕ РЕЗЕРВНЫЕ РЕГИОНЫ (Чехия, Швеция) ---
          download_with_fallback "fast.txt" \
            "https://fastly.jsdelivr.net/gh/igareck/vpn-configs-for-russia@main/BLACK_VLESS_RUS_mobile.txt?filter=(?i)Czechia%7CSweden" \
            "https://gcore.jsdelivr.net/gh/igareck/vpn-configs-for-russia@main/BLACK_VLESS_RUS_mobile.txt?filter=(?i)Czechia%7CSweden" \
            "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/main/BLACK_VLESS_RUS_mobile.txt"
          add_section "FAST: Czechia, Sweden" "fast.txt"
          
          # --- РОССИЙСКИЕ СЕРВЕРЫ ДЛЯ ЧЕБУРНЕТА (без фильтров) ---
          download_with_fallback "rescue.txt" \
            "https://fastly.jsdelivr.net/gh/igareck/vpn-configs-for-russia@main/Vless-Reality-White-Lists-Rus-Mobile.txt" \
            "https://gcore.jsdelivr.net/gh/igareck/vpn-configs-for-russia@main/Vless-Reality-White-Lists-Rus-Mobile.txt" \
            "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/main/Vless-Reality-White-Lists-Rus-Mobile.txt"
          add_section "RESCUE: Russian servers for Cheburnet" "rescue.txt"
      
      - name: Commit and push
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add combined.txt
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update optimized VPN list $(date -u +"%Y-%m-%d %H:%M UTC")" && git push origin main)
