- name: Download and combine (NO Russia)
  run: |
    curl -s "https://fastly.jsdelivr.net/gh/igareck/vpn-configs-for-russia@main/BLACK_VLESS_RUS_mobile.txt?filter=(?i)Germany%7CFinland%7CNetherlands%7CPoland" > temp.txt
    grep -iv "russia|moscow|ru|sbrf" temp.txt >> combined.txt || true
    rm temp.txt
    echo "" >> combined.txt
    
    curl -s "https://fastly.jsdelivr.net/gh/igareck/vpn-configs-for-russia@main/BLACK_VLESS_RUS_mobile.txt?filter=(?i)Czechia%7CSweden" > temp.txt
    grep -iv "russia|moscow|ru|sbrf" temp.txt >> combined.txt || true
    rm temp.txt
    echo "" >> combined.txt
    
    # ... остальные 3 curl ТАК ЖЕ ...
    
    echo "Configs без RU: $(wc -l < combined.txt)"
