name: Combine VPN Lists (NO Russia SUPER)

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  combine:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Download + SUPER FILTER NO Russia
        run: |
          # ОЧИСТКА
          > combined.txt
          
          # ФУНКЦИЯ СУПЕРФИЛЬТРА (удаляет RU IP/host)
          filter_no_ru() {
            curl -s "$1" | grep -E '^vless://|^ss://|^vmess://' | \
            grep -Ev '(
              5.188.|109.120.|95.85.|31.31.|46.62.|176.96.|2.60.|78.25.|
              92.53.|213.228.|212.48.|217.107.|194.58.|194.67.|
              russia|русс|РУС|RU:|russ.|miner|anti-vpn.ru|
              %F0%9F%87%B7%F0%9F%87%BA
            )' | grep -v binary
          }
          
          # 1. TURBO
          filter_no_ru "https://fastly.jsdelivr.net/gh/igareck/vpn-configs-for-russia@main/BLACK_VLESS_RUS_mobile.txt?filter=(?i)Germany%7CFinland%7CNetherlands%7CPoland" >> combined.txt
          echo "" >> combined.txt
          
          # 2. FAST
          filter_no_ru "https://fastly.jsdelivr.net/gh/igareck/vpn-configs-for-russia@main/BLACK_VLESS_RUS_mobile.txt?filter=(?i)Czechia%7CSweden" >> combined.txt
          echo "" >> combined.txt
          
          # 3. RESERVE
          filter_no_ru "https://fastly.jsdelivr.net/gh/igareck/vpn-configs-for-russia@main/BLACK_SS+All_RUS.txt?filter=(?i)Turkey%7CRomania" >> combined.txt
          echo "" >> combined.txt
          
          # 4. SS ALL
          filter_no_ru "https://fastly.jsdelivr.net/gh/igareck/vpn-configs-for-russia@main/BLACK_SS+All_RUS.txt?filter=(?i)Germany%7CFinland%7CNetherlands%7CPoland%7CSweden%7CCzechia" >> combined.txt
          echo "" >> combined.txt
          
          # 5. WHITE (самый "русский" — жёсткий фильтр)
          filter_no_ru "https://fastly.jsdelivr.net/gh/igareck/vpn-configs-for-russia@main/Vless-Reality-White-Lists-Rus-Mobile.txt" >> combined.txt
          
          # СТАТИСТИКА
          echo "=== СУПЕРФИЛЬТР Готово ==="
          LINES=$(wc -l < combined.txt)
          echo "Конфигов: $LINES (только НЕ Россия)"
          
          # ПРОВЕРКА НА RU (должно быть 0)
          RU_CHECK=$(grep -c -E '(5.188|109.120|95.85|russia|русс)' combined.txt)
          echo "RU серверов оставлено: $RU_CHECK (должно быть 0!)"
      
      - name: Commit
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add combined.txt
          git commit -m "SUPER NO Russia ($LINES configs) [$(date)]" || echo "No changes"
          git push
