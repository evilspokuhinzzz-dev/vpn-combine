name: ABSOLUTE ZERO — Автономный апдейт

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */2 * * *'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Fetch and Clean
        run: |
          # Используем curl с таймаутом, чтобы не зависать
          UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
          
          # Скачиваем файлы
          curl -sS --max-time 30 -H "User-Agent: $UA" "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/main/BLACK_VLESS_RUS_mobile.txt" > vless.txt
          curl -sS --max-time 30 -H "User-Agent: $UA" "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/main/BLACK_SS+All_RUS.txt" > ss.txt
          curl -sS --max-time 30 -H "User-Agent: $UA" "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/main/Vless-Reality-White-Lists-Rus-Mobile.txt" > white.txt
          
          # Фильтрация: оставляем только строки, начинающиеся строго с протокола
          cat vless.txt ss.txt white.txt | tr -d '\r' | grep -E '^(vless|ss|trojan|hysteria2|vmess)://' | sort -u > combined.txt
          
          # Убираем лишние файлы
          rm -f vless.txt ss.txt white.txt

      - name: Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add combined.txt
          git commit -m "Clean update $(date +'%Y-%m-%d %H:%M')" --allow-empty
          git push origin main --force
